version: '3.8'

services:
  web-portal:
    build:
      context: ./apps/web-portal
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      - supabase
    restart: unless-stopped
    networks:
      - production

  supabase:
    image: supabase/supabase:latest
    ports:
      - "5432:5432"
    volumes:
      - supabase_data_prod:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - production

  mcp-server:
    build: ./services/mcp-server
    ports:
      - "8001:8001"
    restart: unless-stopped
    networks:
      - production

  copilot-app:
    build: ./services/copilot-app
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - production

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - production

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped
    networks:
      - production

networks:
  production:
    driver: bridge

volumes:
  supabase_data_prod:
  ollama_data:
  caddy_data:
